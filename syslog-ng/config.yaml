arch:
- aarch64
- amd64
description: A clean, lightweight syslog receiver storing logs from local devices
  directly into /share/messages
image: linuxserver/syslog-ng
init: false
environment:
  PUID: '0'
  PGID: '0'
map:
- path: /config
  read_only: false
  type: addon_config
- path: /var/log
  read_only: false
  type: share
name: syslog-ng
ports:
  5514/udp: 5514
  6601/tcp: 6601
ports_description:
  5514/udp: Syslog UDP (Default is 5514. You can change it to 514 for standard devices)
  6601/tcp: Syslog TCP
slug: syslog-ng
url: https://hub.docker.com/r/linuxserver/syslog-ng
version: 4.11.0
